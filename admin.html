<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPSC Insight Admin</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  // DIN CONFIG HER
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadMatches = async function () {
  const table = document.getElementById("matchesTable");

  try {
    const snapshot = await getDocs(collection(db, "matches"));

    if (snapshot.empty) {
      table.innerHTML = "<tr><td>Ingen matcher funnet</td></tr>";
      return;
    }

    let html = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      html += `
        <tr>
          <td>${doc.id}</td>
          <td>${data.name || "-"}</td>
          <td>${data.date || "-"}</td>
          <td>${(data.participants || []).length}</td>
        </tr>
      `;
    });

    table.innerHTML = html;

  } catch (err) {
    table.innerHTML = "<tr><td>Feil ved lasting av matcher</td></tr>";
    console.error(err);
  }
}
</script>

<style>
body { background:#0a0c10; color:white; font-family:Arial; padding:20px; }
h1 { color:#e8b84b; }
button { padding:10px; margin:10px 0; }
table { width:100%; border-collapse: collapse; }
td, th { padding:10px; border-bottom:1px solid #333; }
</style>
</head>

<body>

<h1>Admin - Matcher</h1>

<button onclick="loadMatches()">Last matcher</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Navn</th>
<th>Dato</th>
<th>Deltakere</th>
</tr>
</thead>
<tbody id="matchesTable">
<tr><td>Laster...</td></tr>
</tbody>
</table>

</body>
</html>
