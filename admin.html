<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPSC Admin</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:#fff;
  padding:10px;
}

h1 {color:gold;}

button {
  padding:10px;
  margin:5px;
}

.card {
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

input {
  padding:8px;
  width:100%;
  margin:5px 0;
}
</style>
</head>

<body>

<h1>IPSC Admin</h1>

<div id="login">
  <input id="email" placeholder="E-post">
  <input id="password" type="password" placeholder="Passord">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none">

<h2>Brukere</h2>
<div id="users"></div>

<h2>Referanseskyttere</h2>
<div id="shooters"></div>

<h2>Matcher</h2>
<div id="matches"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

window.login = async () => {
  await signInWithEmailAndPassword(
    auth,
    document.getElementById("email").value,
    document.getElementById("password").value
  );

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  loadUsers();
  loadShooters();
  loadMatches();
};

async function loadUsers() {
  const snap = await getDocs(collection(db,"users"));
  let html = "";

  snap.forEach(doc=>{
    const u = doc.data();
    html += `<div class="card">${u.email || doc.id}</div>`;
  });

  document.getElementById("users").innerHTML = html;
}

async function loadShooters() {
  const snap = await getDocs(collection(db,"referenceShooters"));
  let html = "";

  snap.forEach(doc=>{
    const s = doc.data();
    html += `<div class="card">${s.name}</div>`;
  });

  document.getElementById("shooters").innerHTML = html;
}

async function loadMatches() {
  const snap = await getDocs(collection(db,"matches"));
  let html = "";

  snap.forEach(doc=>{
    const m = doc.data();
    html += `<div class="card">${m.name}</div>`;
  });

  document.getElementById("matches").innerHTML = html;
}

</script>

</body>
</html>
