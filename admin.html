<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPSC Insight - Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0c10;
      --bg2: #111318;
      --bg3: #181c24;
      --card: #1a1e28;
      --border: rgba(255,255,255,0.07);
      --accent: #e8b84b;
      --accent2: #f0d080;
      --red: #e05252;
      --green: #4caf7d;
      --blue: #4a9eff;
      --text: #f0f2f5;
      --muted: #6b7280;
      --sub: #9ca3af;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header h1 span {
      color: var(--accent);
    }

    .header p {
      color: var(--muted);
      font-size: 14px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent2);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--card);
    }

    .btn-danger {
      background: var(--red);
      color: white;
    }

    .table-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--bg3);
    }

    th {
      padding: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px;
      border-top: 1px solid var(--border);
      font-size: 14px;
    }

    tr:hover {
      background: var(--bg3);
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-active {
      background: rgba(76,175,125,.15);
      color: var(--green);
      border: 1px solid rgba(76,175,125,.3);
    }

    .badge-inactive {
      background: rgba(224,82,82,.1);
      color: var(--red);
      border: 1px solid rgba(224,82,82,.2);
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      max-width: 500px;
      width: 90%;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-size: 14px;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .form-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: 6px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .error {
      background: rgba(224,82,82,.1);
      border: 1px solid rgba(224,82,82,.2);
      color: var(--red);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state h3 {
      font-size: 18px;
      margin-bottom: 8px;
      color: var(--sub);
    }

    #logoutBtn {
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>IPSC <span>INSIGHT</span> Admin</h1>
      <p>Administrer invitasjonskoder</p>
    </div>

    <div id="loginSection" style="display: none;">
      <div class="modal-content" style="margin: 100px auto;">
        <div class="modal-title">Admin Login</div>
        <div id="loginError" class="error" style="display: none;"></div>
        <div class="form-group">
          <label class="form-label">E-post</label>
          <input id="loginEmail" class="form-input" type="email" placeholder="admin@ipsc.no">
        </div>
        <div class="form-group">
          <label class="form-label">Passord</label>
          <input id="loginPassword" class="form-input" type="password" placeholder="Passord">
        </div>
        <button id="loginBtn" class="btn btn-primary" style="width: 100%;">Logg inn</button>
      </div>
    </div>

    <div id="adminContent" style="display: none;">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Totalt koder</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statActive">0</div>
          <div class="stat-label">Aktive koder</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statUsed">0</div>
          <div class="stat-label">Totalt brukt</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statUsers">0</div>
          <div class="stat-label">Totalt brukere</div>
        </div>
      </div>

      <div class="actions">
        <button id="createCodeBtn" class="btn btn-primary">+ Ny kode</button>
        <button id="refreshBtn" class="btn btn-secondary">↻ Oppdater</button>
        <button id="logoutBtn" class="btn btn-secondary">Logg ut</button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Kode</th>
              <th>Status</th>
              <th>Maks bruk</th>
              <th>Brukt</th>
              <th>Beskrivelse</th>
              <th>Opprettet</th>
              <th>Handlinger</th>
            </tr>
          </thead>
          <tbody id="codesTable">
            <tr>
              <td colspan="7" class="loading">Laster...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Create Code Modal -->
  <div id="createModal" class="modal">
    <div class="modal-content">
      <div class="modal-title">Opprett ny kode</div>
      <div id="createError" class="error" style="display: none;"></div>
      <div class="form-group">
        <label class="form-label">Kode</label>
        <input id="newCode" class="form-input" type="text" placeholder="IPSC2026" style="text-transform: uppercase;">
      </div>
      <div class="form-group">
        <label class="form-label">Maks bruk (la stå tom for ubegrenset)</label>
        <input id="newMaxUses" class="form-input" type="number" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">Beskrivelse (valgfri)</label>
        <input id="newDescription" class="form-input" type="text" placeholder="For NOP medlemmer">
      </div>
      <div class="form-actions">
        <button id="confirmCreateBtn" class="btn btn-primary">Opprett</button>
        <button id="cancelCreateBtn" class="btn btn-secondary">Avbryt</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, db } from './src/firebase.js';
    import { 
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged 
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { 
      doc,
      getDoc 
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { 
      getFunctions,
      httpsCallable 
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-functions.js';

    const functions = getFunctions();
    let currentUser = null;

    // DOM elements
    const loginSection = document.getElementById('loginSection');
    const adminContent = document.getElementById('adminContent');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');
    const logoutBtn = document.getElementById('logoutBtn');
    const createCodeBtn = document.getElementById('createCodeBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const createModal = document.getElementById('createModal');
    const createError = document.getElementById('createError');
    const confirmCreateBtn = document.getElementById('confirmCreateBtn');
    const cancelCreateBtn = document.getElementById('cancelCreateBtn');
    const codesTable = document.getElementById('codesTable');

    // Auth state
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // Check if user is admin
        const adminDoc = await getDoc(doc(db, 'adminUsers', user.email));
        if (adminDoc.exists()) {
          currentUser = user;
          loginSection.style.display = 'none';
          adminContent.style.display = 'block';
          loadCodes();
        } else {
          alert('Du har ikke admin-tilgang');
          await signOut(auth);
        }
      } else {
        currentUser = null;
        loginSection.style.display = 'block';
        adminContent.style.display = 'none';
      }
    });

    // Login
    loginBtn.onclick = async () => {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showError(loginError, 'Fyll ut alle feltene');
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (error) {
        showError(loginError, 'Innlogging feilet: ' + error.message);
      }
    };

    // Logout
    logoutBtn.onclick = async () => {
      await signOut(auth);
    };

    // Load codes
    async function loadCodes() {
      try {
        const listCodes = httpsCallable(functions, 'listInviteCodes');
        const result = await listCodes();
        const codes = result.data.codes;

        // Update stats
        const totalCodes = codes.length;
        const activeCodes = codes.filter(c => c.active).length;
        const totalUsed = codes.reduce((sum, c) => sum + c.usedCount, 0);
        const uniqueUsers = new Set();
        codes.forEach(c => {
          if (c.usedBy) {
            c.usedBy.forEach(u => uniqueUsers.add(u));
          }
        });

        document.getElementById('statTotal').textContent = totalCodes;
        document.getElementById('statActive').textContent = activeCodes;
        document.getElementById('statUsed').textContent = totalUsed;
        document.getElementById('statUsers').textContent = uniqueUsers.size;

        // Render table
        if (codes.length === 0) {
          codesTable.innerHTML = `
            <tr>
              <td colspan="7" class="empty-state">
                <h3>Ingen koder ennå</h3>
                <p>Klikk "Ny kode" for å opprette din første invitasjonskode</p>
              </td>
            </tr>
          `;
        } else {
          codesTable.innerHTML = codes.map(code => `
            <tr>
              <td><strong>${code.code}</strong></td>
              <td>
                <span class="badge ${code.active ? 'badge-active' : 'badge-inactive'}">
                  ${code.active ? 'Aktiv' : 'Inaktiv'}
                </span>
              </td>
              <td>${code.maxUses || '∞'}</td>
              <td>${code.usedCount}</td>
              <td>${code.description || '—'}</td>
              <td>${formatDate(code.createdAt)}</td>
              <td>
                <div class="action-btns">
                  <button class="btn btn-sm btn-secondary" onclick="toggleCode('${code.code}', ${!code.active})">
                    ${code.active ? 'Deaktiver' : 'Aktiver'}
                  </button>
                  <button class="btn btn-sm btn-danger" onclick="deleteCode('${code.code}')">
                    Slett
                  </button>
                </div>
              </td>
            </tr>
          `).join('');
        }
      } catch (error) {
        console.error('Error loading codes:', error);
        codesTable.innerHTML = `
          <tr>
            <td colspan="7" class="error">Feil ved lasting av koder: ${error.message}</td>
          </tr>
        `;
      }
    }

    // Create code
    createCodeBtn.onclick = () => {
      createModal.classList.add('open');
      createError.style.display = 'none';
      document.getElementById('newCode').value = '';
      document.getElementById('newMaxUses').value = '';
      document.getElementById('newDescription').value = '';
    };

    cancelCreateBtn.onclick = () => {
      createModal.classList.remove('open');
    };

    confirmCreateBtn.onclick = async () => {
      const code = document.getElementById('newCode').value.trim().toUpperCase();
      const maxUses = document.getElementById('newMaxUses').value;
      const description = document.getElementById('newDescription').value.trim();

      if (!code) {
        showError(createError, 'Kode er påkrevd');
        return;
      }

      try {
        const createCode = httpsCallable(functions, 'createInviteCode');
        await createCode({
          code: code,
          maxUses: maxUses ? parseInt(maxUses) : null,
          description: description
        });

        createModal.classList.remove('open');
        loadCodes();
      } catch (error) {
        showError(createError, error.message);
      }
    };

    // Toggle code
    window.toggleCode = async (code, active) => {
      try {
        const toggleCode = httpsCallable(functions, 'toggleInviteCode');
        await toggleCode({ code, active });
        loadCodes();
      } catch (error) {
        alert('Feil: ' + error.message);
      }
    };

    // Delete code
    window.deleteCode = async (code) => {
      if (!confirm(`Er du sikker på at du vil slette koden "${code}"?`)) {
        return;
      }

      try {
        const deleteCode = httpsCallable(functions, 'deleteInviteCode');
        await deleteCode({ code });
        loadCodes();
      } catch (error) {
        alert('Feil: ' + error.message);
      }
    };

    // Refresh
    refreshBtn.onclick = loadCodes;

    // Helper functions
    function showError(element, message) {
      element.textContent = message;
      element.style.display = 'block';
      setTimeout(() => {
        element.style.display = 'none';
      }, 5000);
    }

    function formatDate(dateString) {
      if (!dateString) return '—';
      const date = new Date(dateString);
      return date.toLocaleDateString('no-NO', { 
        year: 'numeric', 
        month: 'short', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
